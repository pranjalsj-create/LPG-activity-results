<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPG-1 Activity Scoreboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom styles for podium animation and appearance */
        .podium-item {
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }
        .podium-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .podium-1 { border-bottom: 8px solid #FFD700; } /* Gold */
        .podium-2 { border-bottom: 8px solid #C0C0C0; } /* Silver */
        .podium-3 { border-bottom: 8px solid #CD7F32; } /* Bronze */

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white antialiased">

    <!-- Main Container -->
    <div class="container mx-auto p-4 sm:p-6 lg:p-8">

        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-yellow-400 to-yellow-500">
                LPG-1 Activity
            </h1>
            <p class="mt-2 text-lg text-gray-400">Official Scoreboard</p>
        </header>

        <!-- Podium Section for Top 3 Teams -->
        <section id="podium-section" class="mb-12">
            <h2 class="text-2xl font-bold text-center mb-8">Top Performers</h2>
            <div class="flex flex-col md:flex-row justify-center items-end gap-4">
                <!-- 2nd Place -->
                <div id="podium-2" class="podium-item w-full md:w-1/4 bg-gray-800 p-6 rounded-xl text-center order-2 md:order-1 fade-in" style="animation-delay: 0.2s;">
                    <!-- Placeholder for 2nd place content -->
                </div>

                <!-- 1st Place -->
                <div id="podium-1" class="podium-item w-full md:w-1/3 bg-gray-800 p-8 rounded-2xl text-center order-1 md:order-2 fade-in">
                    <!-- Placeholder for 1st place content -->
                </div>

                <!-- 3rd Place -->
                <div id="podium-3" class="podium-item w-full md:w-1/4 bg-gray-800 p-6 rounded-xl text-center order-3 md:order-3 fade-in" style="animation-delay: 0.4s;">
                    <!-- Placeholder for 3rd place content -->
                </div>
            </div>
        </section>

        <!-- Full Leaderboard Table -->
        <section id="leaderboard-section">
            <h2 class="text-2xl font-bold text-center mb-8">Full Leaderboard</h2>
            <div class="bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-700">
                            <tr>
                                <th class="p-4 font-semibold tracking-wider">Rank</th>
                                <th class="p-4 font-semibold tracking-wider">Group No</th>
                                <th class="p-4 font-semibold tracking-wider">Score 1</th>
                                <th class="p-4 font-semibold tracking-wider">Score 2</th>
                                <th class="p-4 font-semibold tracking-wider">Total Score</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-gray-600">
                            <!-- Rows will be dynamically inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </div>

    <script>
        // Data from the scorecard image
        const teamData = [
            { group: 1, score1: 8, score2: 7 },
            { group: 2, score1: 8.5, score2: 7.25 },
            { group: 3, score1: 6.5, score2: 7.25 },
            { group: 4, score1: 8.5, score2: 7 },
            { group: 5, score1: 7, score2: 6.75 },
            { group: 6, score1: 7.5, score2: 7 },
            { group: 7, score1: 9, score2: 7.5 },
            { group: 8, score1: 8, score2: 6.5 },
            { group: 9, score1: 6, score2: 6.75 },
            { group: 10, score1: 6, score2: 6.5 },
            { group: 11, score1: 8.5, score2: 6.75 },
            { group: 12, score1: 8, score2: 6.5 },
            { group: 13, score1: 8, score2: 7.25 }
        ];

        // Function to calculate total score and sort teams
        function processScores(data) {
            // Calculate total score for each team
            const rankedData = data.map(team => ({
                ...team,
                totalScore: team.score1 + team.score2
            }));

            // Sort teams by total score in descending order
            rankedData.sort((a, b) => b.totalScore - a.totalScore);
            
            return rankedData;
        }

        // Function to render the podium
        function renderPodium(sortedData) {
            const podiumData = [
                { rank: 2, data: sortedData[1], color: '#C0C0C0', shadow: 'shadow-slate-500/50' },
                { rank: 1, data: sortedData[0], color: '#FFD700', shadow: 'shadow-yellow-400/50' },
                { rank: 3, data: sortedData[2], color: '#CD7F32', shadow: 'shadow-orange-700/50' }
            ];

            podiumData.forEach(item => {
                const container = document.getElementById(`podium-${item.rank}`);
                const scale = item.rank === 1 ? 'scale(1.2)' : 'scale(1)';
                
                container.innerHTML = `
                    <div class="flex justify-center mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" viewBox="0 0 24 24" fill="${item.color}">
                            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-12h2v6h-2zm0 8h2v2h-2z"/>
                            <path d="M12,4a8,8,0,1,0,8,8A8,8,0,0,0,12,4Zm0,14a6,6,0,1,1,6-6A6,6,0,0,1,12,18Z" opacity="0.4"/>
                            <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-size="10" font-weight="bold" fill="#1f2937">${item.rank}</text>
                        </svg>
                    </div>
                    <h3 class="text-2xl font-bold text-white">Group ${item.data.group}</h3>
                    <p class="text-4xl font-extrabold" style="color:${item.color};">${item.data.totalScore.toFixed(2)}</p>
                    <p class="text-sm text-gray-400 mt-2">Score: ${item.data.score1} + ${item.data.score2}</p>
                `;
                if(item.rank === 1) {
                    container.classList.add('shadow-2xl', item.shadow);
                }
            });
        }

        // Function to render the full leaderboard table
        function renderLeaderboard(sortedData) {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = ''; // Clear existing rows

            sortedData.forEach((team, index) => {
                const rank = index + 1;
                const row = document.createElement('tr');
                row.className = 'hover:bg-gray-700 transition-colors duration-200 fade-in';
                row.style.animationDelay = `${index * 50}ms`;

                let rankDisplay;
                if (rank === 1) rankDisplay = '🥇';
                else if (rank === 2) rankDisplay = '🥈';
                else if (rank === 3) rankDisplay = '🥉';
                else rankDisplay = rank;

                row.innerHTML = `
                    <td class="p-4 font-bold text-lg">${rankDisplay}</td>
                    <td class="p-4 font-semibold">Group ${team.group}</td>
                    <td class="p-4 text-gray-300">${team.score1.toFixed(2)}</td>
                    <td class="p-4 text-gray-300">${team.score2.toFixed(2)}</td>
                    <td class="p-4 font-bold text-yellow-400">${team.totalScore.toFixed(2)}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // Initial render on page load
        document.addEventListener('DOMContentLoaded', () => {
            const sortedTeams = processScores(teamData);
            renderPodium(sortedTeams);
            renderLeaderboard(sortedTeams);
        });
    </script>

</body>
</html>
